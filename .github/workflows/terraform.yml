name: Terraform

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      apply:
        description: 'Run terraform apply'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  ARM_USE_OIDC: true
  ARM_USE_AZUREAD: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_vm_admin_ssh_public_key: ${{ secrets.TF_VAR_VM_ADMIN_SSH_PUBLIC_KEY }}
  TF_STATE_RESOURCE_GROUP: ${{ secrets.TF_STATE_RESOURCE_GROUP }}
  TF_STATE_STORAGE_ACCOUNT: ${{ secrets.TF_STATE_STORAGE_ACCOUNT }}
  TF_STATE_CONTAINER: ${{ secrets.TF_STATE_CONTAINER }}
  TF_STATE_KEY: ${{ secrets.TF_STATE_KEY }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Azure Login
        if: env.ARM_CLIENT_ID != '' && env.ARM_TENANT_ID != '' && env.ARM_SUBSCRIPTION_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: |
          if [ -n "${TF_STATE_RESOURCE_GROUP}" ] && [ -n "${TF_STATE_STORAGE_ACCOUNT}" ] && [ -n "${TF_STATE_CONTAINER}" ] && [ -n "${TF_STATE_KEY}" ]; then
            terraform init \
              -backend-config="use_oidc=true" \
              -backend-config="use_azuread_auth=true" \
              -backend-config="resource_group_name=${TF_STATE_RESOURCE_GROUP}" \
              -backend-config="storage_account_name=${TF_STATE_STORAGE_ACCOUNT}" \
              -backend-config="container_name=${TF_STATE_CONTAINER}" \
              -backend-config="key=${TF_STATE_KEY}"
          else
            terraform init -backend=false
          fi

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: env.ARM_CLIENT_ID != '' && env.ARM_TENANT_ID != '' && env.ARM_SUBSCRIPTION_ID != '' && env.TF_VAR_vm_admin_ssh_public_key != ''
        run: terraform plan -no-color -out=tfplan | tee tfplan.txt

      - name: Upload Terraform Plan
        if: github.event_name == 'pull_request' && env.ARM_CLIENT_ID != '' && env.ARM_TENANT_ID != '' && env.ARM_SUBSCRIPTION_ID != '' && env.TF_VAR_vm_admin_ssh_public_key != ''
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: |
            tfplan
            tfplan.txt

      - name: Comment Terraform Plan
        if: github.event_name == 'pull_request' && env.ARM_CLIENT_ID != '' && env.ARM_TENANT_ID != '' && env.ARM_SUBSCRIPTION_ID != '' && env.TF_VAR_vm_admin_ssh_public_key != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'tfplan.txt';
            const marker = '<!-- terraform-plan-comment -->';
            let plan = fs.readFileSync(path, 'utf8');
            if (plan.length > 60000) {
              plan = `${plan.slice(0, 60000)}\n\n...plan output truncated...`;
            }
            const body = `${marker}
            ## Terraform Plan

            \`\`\`text
            ${plan}
            \`\`\``;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number
            });
            const existing = comments.find((comment) => comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Terraform Apply
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true' && env.ARM_CLIENT_ID != '' && env.ARM_TENANT_ID != '' && env.ARM_SUBSCRIPTION_ID != '' && env.TF_VAR_vm_admin_ssh_public_key != ''
        run: terraform apply -auto-approve
